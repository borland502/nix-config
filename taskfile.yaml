# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  IS_WINDOWS: '{{eq OS "windows"}}'
  IS_LINUX: '{{eq OS "linux"}}'
  IS_DARWIN: '{{eq OS "darwin"}}'

  # Resolve chezmoi from PATH or fall back to a temporary nix shell. This
  # covers the bootstrap window where home-manager has not yet activated the
  # nix profile (and therefore chezmoi is not yet on PATH).
  CHEZMOI:
    sh: command -v chezmoi 2>/dev/null || printf 'nix shell nixpkgs#chezmoi --command chezmoi'

  # Auto-detect host based on hostname or allow override.
  # The generic names in this repo are placeholder install targets for new systems.
  DETECTED_HOST:
    sh: |
      {{if eq OS "windows"}}echo linux{{else}}
      os=$(uname)
      hostname=$(hostname)
      case "$os:$hostname" in
        "Darwin:"*) echo "darwin" ;;
        "Linux:nixos"|"Linux:wsl") echo "wsl" ;;
        "Linux:linux") echo "linux" ;;
        "Linux:"*)
          if grep -qi microsoft /proc/version 2>/dev/null && [ -f /etc/os-release ]; then
            distro_id=$(. /etc/os-release 2>/dev/null && echo "$ID")
            case "$distro_id" in
              debian) echo "debian-wsl" ;;
              ubuntu) echo "ubuntu-wsl" ;;
              *) echo "linux" ;;
            esac
          else
            echo "linux"
          fi
        ;;
        *) echo "linux" ;;
      esac
      {{end}}
  HOST: '{{.HOST | default .DETECTED_HOST}}'
  HOME_ATTR:
    sh: |
      {{if eq OS "windows"}}echo windows{{else}}
      case "{{.HOST | default .DETECTED_HOST}}" in
        "wsl") echo "jhettenh@wsl" ;;
        *) echo "jhettenh@{{.HOST | default .DETECTED_HOST}}" ;;
      esac
      {{end}}
  SYSTEM_FLAKE:
    sh: |
      {{if eq OS "windows"}}echo .{{else}}
      case "{{.HOST | default .DETECTED_HOST}}" in
        "wsl") printf 'path:%s#wsl\n' "$PWD" ;;
        *) printf '.#%s\n' "{{.HOST | default .DETECTED_HOST}}" ;;
      esac
      {{end}}
  HOME_FLAKE:
    sh: |
      {{if eq OS "windows"}}echo .{{else}}
      case "{{.HOST | default .DETECTED_HOST}}" in
        "wsl") printf 'path:%s#jhettenh@wsl\n' "$PWD" ;;
        *) printf '.#%s\n' "{{.HOME_ATTR}}" ;;
      esac
      {{end}}
  HOME_MANAGER_APP:
    sh: |
      {{if eq OS "windows"}}echo .{{else}}
      case "{{.HOST | default .DETECTED_HOST}}" in
        "wsl") printf 'path:%s#home-manager\n' "$PWD" ;;
        *) printf '.#home-manager\n' ;;
      esac
      {{end}}
  NIX_CONFIG_PREFIX:
    sh: |
      {{if eq OS "windows"}}echo{{else}}
      case "{{.HOST | default .DETECTED_HOST}}" in
        "wsl") printf 'NIX_CONFIG="experimental-features = nix-command flakes" ' ;;
        *) printf '' ;;
      esac
      {{end}}
  ROOT_CMD:
    sh: |
      {{if eq OS "windows"}}echo sudo{{else}}
      if [[ "$(uname)" == "Linux" && -x /run/wrappers/bin/sudo ]]; then
        printf '/run/wrappers/bin/sudo\n'
      else
        printf 'sudo\n'
      fi
      {{end}}
  IN_DEVCONTAINER:
    sh: |
      {{if eq OS "windows"}}echo false{{else}}
      [[ -n "${INSIDE_DEVCONTAINER:-}" ]] && echo "true" || echo "false"
      {{end}}
  IS_NIXOS:
    sh: |
      {{if eq OS "windows"}}echo false{{else}}
      command -v nixos-rebuild > /dev/null 2>&1 && echo "true" || echo "false"
      {{end}}
  DEVCONTAINER_ATTR:
    sh: |
      {{if eq OS "windows"}}echo "vscode@devcontainer"{{else}}
      arch=$(uname -m)
      if [[ "$arch" == "aarch64" || "$arch" == "arm64" ]]; then
        echo "vscode@devcontainer-aarch64"
      else
        echo "vscode@devcontainer"
      fi
      {{end}}

tasks:
  # Internal helper — records $PWD so home-manager activation can wire chezmoi
  # to the correct repo location regardless of what the directory is named.
  _record-nix-config-dir:
    internal: true
    platforms: [linux, darwin]
    cmd: |
      mkdir -p "$HOME/.local/state/chezmoi"
      printf '%s\n' "$PWD" > "$HOME/.local/state/chezmoi/nix-config-dir"

  # chezmoi — dotfile management backed by this repo
  chezmoi-init:
    desc: Point chezmoi at this repo and regenerate config from template (run once after cloning to a new path)
    cmds:
      - cmd: |
          mkdir -p "$HOME/.local/state/chezmoi"
          printf '%s\n' "$PWD" > "$HOME/.local/state/chezmoi/nix-config-dir"
        platforms: [linux, darwin]
      - |
        _src=$(printf '%s/chezmoi' "$PWD" | tr '\\' '/')
        {{.CHEZMOI}} init --source "$_src"

  chezmoi-apply:
    desc: Apply chezmoi dotfiles to the home directory
    cmd: '{{.CHEZMOI}} apply'

  _chezmoi-ensure:
    internal: true
    desc: Initialize chezmoi if needed, then apply
    # chezmoi's git-repo externals pull from github.com, which is configured here
    # to use the `gh auth git-credential` helper. Without these guards a transient
    # 401/rate-limit (or a stalled helper) drops git into an interactive
    # credential prompt that hangs the whole switch. Force non-interactive,
    # fail-fast git so a problem external errors out instead of blocking.
    env:
      GIT_TERMINAL_PROMPT: "0"
      GIT_ASKPASS: "true"
      SSH_ASKPASS: "true"
      GCM_INTERACTIVE: "never"
      GIT_SSH_COMMAND: "ssh -oBatchMode=yes -oConnectTimeout=10"
    cmd: |
      _src=$(printf '%s/chezmoi' "$PWD" | tr '\\' '/')
      {{.CHEZMOI}} init --source "$_src"
      # --keep-going: a failing external (unreachable/private/rate-limited/deleted
      # repo) is reported but does NOT abort — chezmoi applies every other
      # external and all dotfiles. The timeout is a last-resort backstop against a
      # total network stall; only on a genuine timeout do we re-apply without
      # externals so the dotfiles still land.
      timeout -k 10 300 {{.CHEZMOI}} apply --force --keep-going || {
        rc=$?
        echo "chezmoi apply reported errors (rc=$rc; one or more externals unavailable) — continuing with the switch."
        if [ "$rc" -eq 124 ]; then
          echo "chezmoi timed out; re-applying without externals so dotfiles still land."
          {{.CHEZMOI}} apply --force --keep-going --exclude=externals || true
        fi
      }


  chezmoi-diff:
    desc: Show pending chezmoi changes without applying them
    cmd: '{{.CHEZMOI}} diff'

  chezmoi-status:
    desc: Show chezmoi managed file status
    cmd: '{{.CHEZMOI}} status'

  chezmoi-add:
    desc: Add a file to the chezmoi source (FILE=<path>)
    cmd: '{{.CHEZMOI}} add "{{.FILE}}"'
    requires:
      vars: [FILE]

  chezmoi-edit:
    desc: Edit a chezmoi-managed file (FILE=<path>)
    cmd: '{{.CHEZMOI}} edit "{{.FILE}}"'
    requires:
      vars: [FILE]

  # System management - Auto-detect platform
  build:
    desc: Build the system configuration
    platforms: [linux, darwin]
    cmd: |
      {{if eq .IN_DEVCONTAINER "true"}}
        nix build .#homeConfigurations."{{.DEVCONTAINER_ATTR}}".activationPackage
      {{else if eq .IS_DARWIN "true"}}
        darwin-rebuild build --flake .#{{.HOST}}
      {{else if eq .IS_NIXOS "true"}}
        {{.NIX_CONFIG_PREFIX}}nixos-rebuild build --flake "{{.SYSTEM_FLAKE}}"
      {{else}}
        {{.NIX_CONFIG_PREFIX}}nix run "{{.HOME_MANAGER_APP}}" -- build --flake "{{.HOME_FLAKE}}"
      {{end}}

  switch:
    desc: Build and switch to the system configuration
    platforms: [linux, darwin]
    deps: [_record-nix-config-dir, _chezmoi-ensure, fmt, generate:agent-instructions]
    # Skip the Discord cask in `brew bundle` only when it is ALREADY installed,
    # so a DPI-blocked Discord CDN download can't fail the whole darwin switch.
    # Survives the activation's `sudo --preserve-env=PATH` via the env_keep in
    # hosts/darwin/default.nix. Empty (skip nothing) on Linux or a fresh install,
    # so a missing Discord is still installed normally.
    env: &brew-cask-skip-env
      HOMEBREW_BUNDLE_CASK_SKIP:
        sh: 'if command -v brew >/dev/null 2>&1 && brew list --cask discord >/dev/null 2>&1; then echo discord; fi'
    cmd: |
      {{if eq .IN_DEVCONTAINER "true"}}
        nix run .#home-manager -- switch --flake .#"{{.DEVCONTAINER_ATTR}}" -b bak-devcontainer
      {{else if eq .IS_DARWIN "true"}}
        brew update --quiet
        sudo darwin-rebuild switch --flake .#{{.HOST}}
      {{else if eq .IS_NIXOS "true"}}
        bash scripts/nixos-switch-tolerant.sh "{{.SYSTEM_FLAKE}}"
      {{else}}
        {{.NIX_CONFIG_PREFIX}}nix run "{{.HOME_MANAGER_APP}}" -- switch --flake "{{.HOME_FLAKE}}"
      {{end}}

  # Darwin-specific tasks
  darwin:
    desc: Switch to the Darwin configuration
    platforms: [darwin]
    cmd: task switch HOST=darwin

  darwin-build:
    desc: Build the nix-darwin configuration
    platforms: [darwin]
    cmd: darwin-rebuild build --flake .#{{.HOST}}

  darwin-switch:
    desc: Build and switch to the nix-darwin configuration
    platforms: [darwin]
    deps: [_record-nix-config-dir, _chezmoi-ensure]
    # See `switch`: skip an already-installed Discord cask in the darwin bundle.
    env: *brew-cask-skip-env
    cmd: sudo darwin-rebuild switch --flake .#{{.HOST}}

  # NixOS-specific tasks (kept for Linux systems)
  nixos-build:
    desc: Build the NixOS configuration
    platforms: [linux]
    cmd: '{{.NIX_CONFIG_PREFIX}}nixos-rebuild build --flake "{{.SYSTEM_FLAKE}}"'
    preconditions:
      - sh: '[[ -z "${INSIDE_DEVCONTAINER:-}" ]]'
        msg: 'This task is unavailable inside the devcontainer'

  nixos-switch:
    desc: Build and switch to the NixOS configuration
    platforms: [linux]
    deps: [_record-nix-config-dir, _chezmoi-ensure]
    cmd: 'bash scripts/nixos-switch-tolerant.sh "{{.SYSTEM_FLAKE}}"'
    preconditions:
      - sh: '[[ -z "${INSIDE_DEVCONTAINER:-}" ]]'
        msg: 'This task is unavailable inside the devcontainer'

  boot:
    desc: Build and boot the NixOS configuration (for testing)
    platforms: [linux]
    cmd: '{{.NIX_CONFIG_PREFIX}}{{.ROOT_CMD}} nixos-rebuild boot --flake "{{.SYSTEM_FLAKE}}"'
    preconditions:
      - sh: '[[ -z "${INSIDE_DEVCONTAINER:-}" ]]'
        msg: 'This task is unavailable inside the devcontainer'

  test:
    desc: Test the NixOS configuration
    platforms: [linux]
    cmd: '{{.NIX_CONFIG_PREFIX}}nixos-rebuild test --flake "{{.SYSTEM_FLAKE}}"'
    preconditions:
      - sh: '[[ -z "${INSIDE_DEVCONTAINER:-}" ]]'
        msg: 'This task is unavailable inside the devcontainer'

  dry-build:
    desc: Perform a dry build to check for errors without applying changes
    platforms: [linux, darwin]
    cmd: |
      {{if eq .IN_DEVCONTAINER "true"}}
        nix build .#homeConfigurations."{{.DEVCONTAINER_ATTR}}".activationPackage --dry-run
      {{else if eq .IS_DARWIN "true"}}
        darwin-rebuild build --dry-run --flake .#{{.HOST}}
      {{else if eq .IS_NIXOS "true"}}
        {{.NIX_CONFIG_PREFIX}}nixos-rebuild dry-build --flake "{{.SYSTEM_FLAKE}}"
      {{else}}
        {{.NIX_CONFIG_PREFIX}}nix run "{{.HOME_MANAGER_APP}}" -- build --flake "{{.HOME_FLAKE}}"
      {{end}}

  # Home Manager
  home-build:
    desc: Build home-manager configuration
    platforms: [linux, darwin]
    cmd: |
      {{if eq .IN_DEVCONTAINER "true"}}
        nix build .#homeConfigurations."{{.DEVCONTAINER_ATTR}}".activationPackage
      {{else if eq .IS_DARWIN "true"}}
        darwin-rebuild build --flake .#{{.HOST}}
      {{else}}
        {{.NIX_CONFIG_PREFIX}}nix run "{{.HOME_MANAGER_APP}}" -- build --flake "{{.HOME_FLAKE}}"
      {{end}}

  home-switch:
    desc: Switch home-manager configuration
    platforms: [linux, darwin]
    deps: [_record-nix-config-dir, _chezmoi-ensure]
    # See `switch`: skip an already-installed Discord cask in the darwin bundle.
    env: *brew-cask-skip-env
    cmd: |
      {{if eq .IN_DEVCONTAINER "true"}}
        nix run .#home-manager -- switch --flake .#"{{.DEVCONTAINER_ATTR}}" -b bak-devcontainer
      {{else if eq .IS_DARWIN "true"}}
        sudo darwin-rebuild switch --flake .#{{.HOST}}
      {{else if eq .IS_NIXOS "true"}}
        # On NixOS (incl. NixOS-WSL) home is managed as a NixOS module, not a
        # standalone homeConfiguration — there is no `{{.HOME_ATTR}}` attr to
        # build. Apply via the system rebuild; the login shell is set by
        # users.defaultUserShell, so the chsh fixup below is unnecessary.
        bash scripts/nixos-switch-tolerant.sh "{{.SYSTEM_FLAKE}}"
      {{else}}
        {{.NIX_CONFIG_PREFIX}}nix run "{{.HOME_MANAGER_APP}}" -- switch --flake "{{.HOME_FLAKE}}"
        _zsh="$HOME/.nix-profile/bin/zsh"
        if [ -x "$_zsh" ] && [ "$(grep -m1 "^$USER:" /etc/passwd | cut -d: -f7)" != "$_zsh" ]; then
          grep -qxF "$_zsh" /etc/shells 2>/dev/null || printf '%s\n' "$_zsh" | sudo tee -a /etc/shells >/dev/null
          sudo usermod -s "$_zsh" "$USER" || chsh -s "$_zsh" || printf 'Note: run: sudo usermod -s %s %s\n' "$_zsh" "$USER"
        fi
      {{end}}

  # Maintenance
  update:
    desc: Update flake inputs
    platforms: [linux, darwin]
    cmd: nix flake update

  gc:
    desc: Garbage collect old generations
    platforms: [linux, darwin]
    cmd: |
      nix-collect-garbage -d
      {{if ne .IN_DEVCONTAINER "true"}}
        {{.ROOT_CMD}} nix-collect-garbage -d
      {{end}}

  optimize:
    desc: Optimize nix store
    platforms: [linux, darwin]
    cmd: nix-store --optimise

  hooks:install:
    desc: Configure Git to use the repository's tracked hooks
    cmd: git config core.hooksPath .githooks

  # Development
  check:
    desc: Check flake for errors
    platforms: [linux, darwin]
    cmd: '{{.NIX_CONFIG_PREFIX}}nix flake check "path:$PWD"'

  fmt:
    desc: Format nix files
    platforms: [linux, darwin]
    cmd: alejandra .

  fmt:check:
    desc: Check nix file formatting
    platforms: [linux, darwin]
    cmd: alejandra --check .

  fmt:md:
    desc: Auto-fix markdown files (skips ai-tools/, chezmoi-generated agent instructions, and the CLAUDE.md pointer)
    platforms: [linux, darwin]
    cmd: markdownlint-cli2 --fix "**/*.md" "#node_modules" "#result" "#result-*" "#ai-tools" "#chezmoi/dot_config/github-copilot" "#chezmoi/dot_config/Code" "#CLAUDE.md"

  fmt:sh:
    desc: Format shell scripts in place (shfmt -w, skips ai-tools/)
    platforms: [linux, darwin]
    cmd: |
      shfmt -f . | awk '!/^ai-tools\//' | while IFS= read -r f; do
        shfmt -w "$f"
      done

  fmt:py:
    desc: Format Python files and apply ruff autofixes (skips ai-tools/)
    platforms: [linux, darwin]
    cmd: |
      ruff format --exclude ai-tools .
      ruff check --fix --exclude ai-tools .

  fmt:toml:
    desc: Format TOML files (taplo fmt, skips ai-tools/)
    platforms: [linux, darwin]
    cmd: taplo fmt $(fd -e toml . --exclude ai-tools)

  fmt:all:
    desc: Run every formatter (nix, markdown, shell, python, toml)
    platforms: [linux, darwin]
    cmds:
      - task: fmt
      - task: fmt:md
      - task: fmt:sh
      - task: fmt:py
      - task: fmt:toml

  lint:
    desc: Run all linters
    platforms: [linux, darwin]
    cmds:
      - task: lint:nix
      - task: lint:md
      - task: lint:sh
      - task: lint:py
      - task: lint:yaml
      - task: lint:toml
      - task: lint:secrets

  lint:nix:
    desc: Lint nix files
    platforms: [linux, darwin]
    cmd: |
      statix check .
      deadnix .
      task check:copilot-instructions
      task check:agent-instructions
      task check:instruction-size

  lint:md:
    desc: Lint markdown files (skips ai-tools/, chezmoi-generated agent instructions, and the CLAUDE.md pointer)
    platforms: [linux, darwin]
    cmd: markdownlint-cli2 "**/*.md" "#node_modules" "#result" "#result-*" "#ai-tools" "#chezmoi/dot_config/github-copilot" "#chezmoi/dot_config/Code" "#CLAUDE.md"

  lint:sh:
    desc: Lint and check formatting of shell scripts (skips ai-tools/)
    platforms: [linux, darwin]
    cmd: |
      shellcheck $(fd -e sh . --exclude node_modules --exclude ai-tools)
      shfmt -f . | awk '!/^ai-tools\//' | while IFS= read -r f; do
        shfmt -d "$f"
      done

  lint:py:
    desc: Lint Python files (skips ai-tools/)
    platforms: [linux, darwin]
    cmd: ruff check --exclude ai-tools .

  lint:yaml:
    desc: Lint YAML files
    platforms: [linux, darwin]
    cmd: yamllint .

  lint:toml:
    desc: Lint TOML files (skips ai-tools/)
    platforms: [linux, darwin]
    cmd: taplo lint $(fd -e toml . --exclude ai-tools)

  lint:secrets:
    desc: Scan repo history for committed secrets with gitleaks
    platforms: [linux, darwin]
    cmd: gitleaks git --redact --no-banner --verbose

  check:copilot-instructions:
    desc: Verify duplicated Copilot instruction files stay in sync
    cmd: bash ./scripts/check-copilot-instructions-sync.sh

  check:instruction-size:
    desc: Guard the per-turn agent instruction source against token bloat
    platforms: [linux, darwin]
    cmd: |
      src="chezmoi/dot_config/instructions/agent-defaults.md"
      max_lines=120
      max_bytes=7000
      lines=$(wc -l <"$src" | tr -d ' ')
      bytes=$(wc -c <"$src" | tr -d ' ')
      fail=0
      if [ "$lines" -gt "$max_lines" ]; then
        printf 'agent-defaults.md: %s lines exceeds budget %s\n' "$lines" "$max_lines" >&2
        fail=1
      fi
      if [ "$bytes" -gt "$max_bytes" ]; then
        printf 'agent-defaults.md: %s bytes exceeds budget %s\n' "$bytes" "$max_bytes" >&2
        fail=1
      fi
      if [ "$fail" -ne 0 ]; then
        printf '%s\n' "This file is rendered into every agent session's system prompt (the cached prefix); growth raises the per-turn token cost on every Claude AND Copilot session. Trim it, or raise the budget deliberately in taskfile.yaml." >&2
        exit 1
      fi
      printf 'instruction size OK: %s lines / %s bytes (budget %s / %s)\n' "$lines" "$bytes" "$max_lines" "$max_bytes"

  generate:agent-instructions:
    desc: Render agent-defaults.md into chezmoi-managed files for Windows deployment
    platforms: [linux, darwin]
    cmd: |
      src="chezmoi/dot_config/instructions/agent-defaults.md"

      mkdir -p chezmoi/dot_claude
      sed 's|@@AGENT@@|claude|g' "$src" > chezmoi/dot_config/claude/CLAUDE.md

      mkdir -p chezmoi/dot_config/github-copilot/intellij
      mkdir -p "chezmoi/dot_config/Code/User/prompts"
      {
        printf -- '---\n'
        printf 'description: "Use for every task. Persistent defaults for terminal commands, shell usage, isolated shells for long or heavily quoted commands, and command logging to ~/.cache/copilot."\n'
        printf 'name: "Persistent Terminal Logging Defaults"\n'
        printf 'applyTo: "**"\n'
        printf -- '---\n\n'
        sed 's|@@AGENT@@|copilot|g' "$src"
      } > chezmoi/dot_config/github-copilot/copilot-defaults.instructions.md
      cp chezmoi/dot_config/github-copilot/copilot-defaults.instructions.md \
         "chezmoi/dot_config/Code/User/prompts/copilot-defaults.instructions.md"
      cp chezmoi/dot_config/github-copilot/copilot-defaults.instructions.md \
         chezmoi/dot_config/github-copilot/intellij/global-copilot-instructions.md

      # Repo-root Copilot mirror (no frontmatter); kept in sync by
      # check:copilot-instructions via scripts/check-copilot-instructions-sync.sh.
      mkdir -p .github
      sed 's|@@AGENT@@|copilot|g' "$src" > .github/copilot-instructions.md

  check:agent-instructions:
    desc: Verify chezmoi agent instruction files match the rendered source
    platforms: [linux, darwin]
    cmd: |
      src="chezmoi/dot_config/instructions/agent-defaults.md"
      tmp=$(mktemp -d)
      trap 'rm -rf "$tmp"' EXIT

      sed 's|@@AGENT@@|claude|g' "$src" > "$tmp/CLAUDE.md"
      {
        printf -- '---\n'
        printf 'description: "Use for every task. Persistent defaults for terminal commands, shell usage, isolated shells for long or heavily quoted commands, and command logging to ~/.cache/copilot."\n'
        printf 'name: "Persistent Terminal Logging Defaults"\n'
        printf 'applyTo: "**"\n'
        printf -- '---\n\n'
        sed 's|@@AGENT@@|copilot|g' "$src"
      } > "$tmp/copilot.md"

      fail=0
      diff -u "$tmp/CLAUDE.md" chezmoi/dot_config/claude/CLAUDE.md || fail=1
      diff -u "$tmp/copilot.md" chezmoi/dot_config/github-copilot/copilot-defaults.instructions.md || fail=1
      diff -u "$tmp/copilot.md" "chezmoi/dot_config/Code/User/prompts/copilot-defaults.instructions.md" || fail=1
      diff -u "$tmp/copilot.md" chezmoi/dot_config/github-copilot/intellij/global-copilot-instructions.md || fail=1

      if [ "$fail" -ne 0 ]; then
        printf '%s\n' 'Stale chezmoi agent instructions. Run: task generate:agent-instructions' >&2
        exit 1
      fi

  skills:enable:
    desc: Symlink an opt-in stack skill into a project (SKILL=<name> DIR=<project root, default .>)
    platforms: [linux, darwin]
    cmd: |
      _src="$PWD/ai-tools/skills-stack/{{.SKILL}}"
      _dest="{{.DIR | default "."}}/.claude/skills"
      if [ ! -d "$_src" ]; then
        printf 'Unknown stack skill: %s\nAvailable:\n' "{{.SKILL}}" >&2
        ls ai-tools/skills-stack >&2
        exit 1
      fi
      mkdir -p "$_dest"
      ln -sfn "$_src" "$_dest/{{.SKILL}}"
      printf 'Linked %s -> %s\n' "$_dest/{{.SKILL}}" "$_src"
    requires:
      vars: [SKILL]

  dev:go-gui:
    desc: Enter the Go GUI development shell
    platforms: [linux]
    cmd: 'nix develop "path:$PWD#go-gui"'

  repl:
    desc: Start nix repl with flake
    platforms: [linux, darwin]
    cmd: nix repl --expr 'builtins.getFlake "."'

  # Platform-specific shortcuts
  linux:
    desc: Switch to the Linux configuration
    platforms: [linux]
    cmd: task switch HOST=linux

  wsl:
    desc: Switch to wsl configuration
    platforms: [linux]
    cmd: task switch HOST=wsl

  wsl-bootstrap-windows:
    desc: Bootstrap Windows tools and fonts from the WSL host
    platforms: [linux]
    cmd: ./scripts/wsl/bootstrap-windows.sh
    preconditions:
      - sh: '[[ -x /mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe ]]'
        msg: 'Windows PowerShell is unavailable from this environment'

  windows-bootstrap:
    desc: Bootstrap Windows tools, fonts, and environment (run natively on Windows)
    platforms: [windows]
    cmd: powershell -NoProfile -ExecutionPolicy Bypass -File "scripts/wsl/bootstrap-windows.ps1"

  # Service management
  service-status:
    desc: Check status of a specific user service
    platforms: [linux]
    cmd: systemctl --user status -- "{{.SERVICE}}"
    requires:
      vars: [SERVICE]
    preconditions:
      - sh: '[[ -z "${INSIDE_DEVCONTAINER:-}" ]]'
        msg: 'User systemd is unavailable inside the devcontainer'

  logs:
    desc: Show logs for a specific service
    platforms: [linux]
    cmd: journalctl --user --follow --unit "{{.SERVICE}}"
    requires:
      vars: [SERVICE]
    preconditions:
      - sh: '[[ -z "${INSIDE_DEVCONTAINER:-}" ]]'
        msg: 'journald is unavailable inside the devcontainer'

  # Quick actions
  edit:
    desc: Open the NixOS configuration in VS Code
    platforms: [linux, darwin]
    cmd: code ~/.config/nix

  upgrade:
    desc: Update nixpkgs and rebuild the system
    platforms: [linux, darwin]
    deps: [_record-nix-config-dir, _chezmoi-ensure, fmt, generate:agent-instructions]
    cmd: |
      nix flake update
      {{if eq .IN_DEVCONTAINER "true"}}
        nix run .#home-manager -- switch --flake .#"{{.DEVCONTAINER_ATTR}}" -b bak-devcontainer
      {{else if eq .IS_DARWIN "true"}}
        sudo darwin-rebuild switch --flake .#{{.HOST}}
      {{else if eq .IS_NIXOS "true"}}
        bash scripts/nixos-switch-tolerant.sh "{{.SYSTEM_FLAKE}}"
      {{else}}
        {{.NIX_CONFIG_PREFIX}}nix run "{{.HOME_MANAGER_APP}}" -- switch --flake "{{.HOME_FLAKE}}"
        _zsh="$HOME/.nix-profile/bin/zsh"
        if [ -x "$_zsh" ] && [ "$(grep -m1 "^$USER:" /etc/passwd | cut -d: -f7)" != "$_zsh" ]; then
          grep -qxF "$_zsh" /etc/shells 2>/dev/null || printf '%s\n' "$_zsh" | sudo tee -a /etc/shells >/dev/null
          sudo usermod -s "$_zsh" "$USER" || chsh -s "$_zsh" || printf 'Note: run: sudo usermod -s %s %s\n' "$_zsh" "$USER"
        fi
      {{end}}
